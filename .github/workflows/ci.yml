name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop, JH_DEV]
  pull_request:
    branches: [main, develop, JH_DEV]

jobs:
  test:
    name: Test, lint and type check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/unit tests/integration -v --cov=packages --cov=apps --cov-report=xml --cov-report=term-missing

      - name: Run ruff
        run: |
          ruff check .
          ruff format . --check

      - name: Run mypy
        run: mypy packages/pv-twin/src/pv_twin apps
